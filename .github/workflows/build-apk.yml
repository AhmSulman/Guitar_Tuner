name: Build Guitar Tuner APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache buildozer downloads
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: buildozer-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            libffi-dev libssl-dev pkg-config \
            autoconf libtool cmake build-essential \
            libncurses5

      - name: Install buildozer and Cython
        run: pip install --upgrade pip buildozer cython

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.android/licenses"
          printf '%s\n' \
            '8933bad161af4178b1185d1a37fbf41ea5269c55' \
            'd56f5187479451eabf01fb78af6dfcb131a6481e' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            > "$HOME/.android/licenses/android-sdk-license"
          printf '%s\n' \
            '84831b9409646a918e30573bab4c9c91346d8abd' \
            > "$HOME/.android/licenses/android-sdk-preview-license"

      - name: Build APK
        run: yes | buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuitarTuner-APK
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error