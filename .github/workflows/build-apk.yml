name: Build Guitar Tuner APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache buildozer downloads
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v1
          restore-keys: buildozer-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            libffi-dev libssl-dev pkg-config \
            autoconf libtool cmake build-essential \
            libncurses5

      - name: Install buildozer and Cython
        run: pip install --upgrade pip buildozer cython

      - name: Pre-accept Android SDK licenses
        run: |
          SDK_LICENSE_HASH_1='8933bad161af4178b1185d1a37fbf41ea5269c55'
          SDK_LICENSE_HASH_2='d56f5187479451eabf01fb78af6dfcb131a6481e'
          SDK_LICENSE_HASH_3='24333f8a63b6825ea9c5514f83c2829b004d1fee'
          PREVIEW_HASH='84831b9409646a918e30573bab4c9c91346d8abd'
          for DIR in \
            "$HOME/.android/licenses" \
            "$HOME/.buildozer/android/platform/android-sdk/licenses"; do
            mkdir -p "$DIR"
            printf '%s\n' "$SDK_LICENSE_HASH_1" "$SDK_LICENSE_HASH_2" "$SDK_LICENSE_HASH_3" \
              > "$DIR/android-sdk-license"
            printf '%s\n' "$PREVIEW_HASH" \
              > "$DIR/android-sdk-preview-license"
          done

      - name: Build APK
        run: yes | buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuitarTuner-APK
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error